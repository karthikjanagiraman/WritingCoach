<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <!-- "Write" in white for dark backgrounds -->
  <text x="10" y="55" font-family="Georgia, 'Literata', serif" font-weight="600" font-size="48" fill="#FFFFFF">Write</text>
  <!-- "Whiz" in light purple -->
  <text x="195" y="55" font-family="'Nunito', 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="48" fill="#A29BFE">Whiz</text>
  <!-- Z splash flourish - lighter colors for dark bg -->
  <g transform="translate(340, 56)">
    <path d="M0,0 Q8,4 6,10 Q4,14 -2,12 Q-6,10 -4,6 Q-2,2 4,4 Z" fill="#A29BFE" opacity="0.8"/>
    <circle cx="12" cy="2" r="3" fill="#FF8A80"/>
    <circle cx="-4" cy="16" r="2.5" fill="#80CBC4"/>
    <circle cx="10" cy="14" r="2" fill="#64B5F6"/>
  </g>
</svg>
